<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>油飯DD｜折扣碼整理</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff7a7a, #ffbe4d, #ffec5c);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
      color: #333;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Tabs */
    .tabs {
      position: sticky;
      top: 0;
      z-index: 999;
      display: flex;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 2px solid #ff7a7a;
    }
    .tab {
      flex: 1;
      padding: 15px 0;
      text-align: center;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
    }
    .tab.active {
      color: #fff;
      background: linear-gradient(90deg,#ff7a7a,#ff9a3d);
    }

    /* Page */
    .page {
      padding: 20px 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align:center;
      color:#fff;
      text-shadow:0 0 10px rgba(0,0,0,0.5);
      margin-bottom:20px;
      line-height:1.3;
    }

    /* Columns */
    .two-column {
      display: flex;
      gap: 20px;
    }
    .column {
      flex: 1;
      background: rgba(255,255,255,0.85);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    h2 {
      color: black;
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    .code-section { margin-bottom: 25px; }
    .code-section p {
      color: #ff2d55;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      flex: 1;
      min-width: 130px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg,#ff7a7a,#ff9a3d);
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      opacity: 0;
      transition: .4s;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }

    /* 社群區塊（已上移＋縮小） */
    .footer {
      margin: 30px auto 0; /* 修正原本負數 margin 的推擠問題 */
      text-align: center;
    }
    .footer-title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #ff4d2d;
    }
    .footer-links a {
      display: inline-block;
      margin: 4px 6px;
      padding: 7px 12px;
      font-size: 0.9em;
      border-radius: 10px;
      background: linear-gradient(135deg,#ff7a7a,#ff9a3d);
      color: #fff;
      text-decoration: none;
    }

    @media (max-width: 800px) {
      .two-column { flex-direction: column; }
    }
  </style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('shopee')">🦐 蝦皮</div>
  <div class="tab" onclick="switchTab('coupang')">🐧 酷澎</div>
</div>

<div class="page">
  <h1>油飯DD省錢攻略<br>最新折扣碼</h1>

  <div class="two-column">

    <div class="column" id="shopee">
      <h2>點擊按鈕自動複製折扣碼</h2>  
      <section class="code-section">
        <p>全站100-20券</p>
        <div class="button-group">
           <button onclick="copyCode('SH0606AF','https://s.shopee.tw/4qD5dz5Q4O')">複製折扣碼</button>
        </div>
      </section>
    </div> <div class="column" id="coupang" style="display:none;">
      <h2>點擊按鈕自動複製折扣碼</h2>
      <section class="code-section"> <p>全站699-50券</p>
        <div class="button-group">
          <button onclick="copyCode('Y26JUN50','https://coupa.ng/cnifPS')">複製折扣碼</button>
        </div>
      </section>
    </div> </div> </div> <div class="footer">
  <div class="footer-title">歡迎加入我的省錢社群 ✨</div>
  <div class="footer-links">
    <a href="https://line.me/ti/g2/ARxvlA8qbIgJf6ut4bngnwDGnLWy3x62pbqiMw" target="_blank">LINE</a>
    <a href="https://www.threads.com/@dd_shopping_go" target="_blank">Threads</a>
    <a href="https://www.dcard.tw/@t5976" target="_blank">Dcard</a>
  </div>
</div>

<div class="toast" id="toast">折扣碼已複製！</div>

<script>
function copyCode(code, url) {
  navigator.clipboard.writeText(code).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 600);
    setTimeout(() => window.location.href = url, 300);
  });
}

function switchTab(target) {
  document.getElementById('shopee').style.display = target === 'shopee' ? 'block' : 'none';
  document.getElementById('coupang').style.display = target === 'coupang' ? 'block' : 'none';
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(target === 'shopee' ? '.tab:first-child' : '.tab:last-child')
    .classList.add('active');
}
</script>

</body>
</html>
